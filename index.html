    {id:"fallguy", title:"Fall Guy", img:"kepek/fallguy.webp", info:"Akció/Vígjáték • 2024"},

];

let currentPage = 1;
const perPage = 20;
let searchTerm = "";
let currentCategory = "all";
let showFavorites = false;

// ❤️ FAVORITE
function getFavorites(){
    return JSON.parse(localStorage.getItem("favs")) || [];
}

function toggleFavorite(id){
    let favs = getFavorites();
    if(favs.includes(id)){
        favs = favs.filter(f => f !== id);
    } else {
        favs.push(id);
    }
    localStorage.setItem("favs", JSON.stringify(favs));
    renderMovies();
}

// ⭐ RATING
function setRating(id, rating){
    let ratings = JSON.parse(localStorage.getItem("ratings")) || {};
    
    // ha ugyanarra kattint → törlés
    if(ratings[id] === rating){
        delete ratings[id];
    } else {
        ratings[id] = rating;
    }

    localStorage.setItem("ratings", JSON.stringify(ratings));
    renderMovies();
}

function getRating(id){
    let ratings = JSON.parse(localStorage.getItem("ratings")) || {};
    return ratings[id] || 0;
}

// 🎯 CATEGORY
function setCategory(cat){
    currentCategory = cat;
    showFavorites = false;
    currentPage = 1;
    renderMovies();
}

// ❤️ FAVORITE FILTER
function toggleFavorites(){
    showFavorites = !showFavorites;
    currentPage = 1;
    renderMovies();
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function(e){
    searchTerm = e.target.value.toLowerCase();
    currentPage = 1;
    renderMovies();
});

function renderMovies(){
    const grid = document.getElementById("movie");
    grid.innerHTML = "";

    const favs = getFavorites();

    let filtered = movies.filter(movie =>
        movie.title.toLowerCase().includes(searchTerm)
    );

    if(currentCategory !== "all"){
        filtered = filtered.filter(movie => movie.info.includes(currentCategory));
    }

    if(showFavorites){
        filtered = filtered.filter(movie => favs.includes(movie.id));
    }

    const start = (currentPage - 1) * perPage;
    const pageMovies = filtered.slice(start, start + perPage);

    pageMovies.forEach(movie => {

        let rating = getRating(movie.id);
        let stars = "";

        for(let i=1;i<=5;i++){
            stars += `<span class="star ${i<=rating?"active":""}" onclick="event.stopPropagation();setRating('${movie.id}',${i})">★</span>`;
        }

        grid.innerHTML += `
        <div class="movie-block" onclick="goToMovie('${movie.id}')">
            <div class="favorite" onclick="event.stopPropagation();toggleFavorite('${movie.id}')">
                ${favs.includes(movie.id) ? "❤️" : "🤍"}
            </div>
            <img src="${movie.img}">
            <div class="movie-info">
                <p>${movie.info}</p>
                <div class="stars">${stars}</div>
                <button>▶ Lejátszás</button>
            </div>
            <h3>${movie.title}</h3>
        </div>
        `;
    });

    document.getElementById("pageNum").innerText = currentPage;
}

function goToMovie(id){
    window.location.href = "filmek.html?film=" + id;
}

function nextPage(){
    currentPage++;
    renderMovies();
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        renderMovies();
    }
}

renderMovies();

`linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('${kepek[random]}')`;
