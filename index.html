    {id:"tasm2", title:"The Amazing Spider-Man 2", img:"kepek/tasm2.webp", info:"Akció/Sci-fi • 2014"},

    {id:"ninjago", title:"Lego Ninjago", img:"kepek/ninjago.webp", info:"Gyerek/Vígjáték • 2017"},
    {id:"the_nightmare_before_xmas", title:"The Nightmare Before Christmas", img:"kepek/the_nightmare_before_xmas.webp", info:"Gyerek/Fantasy • 1993"},
    {id:"pikachumovie", title:"Pikachu The Detective", img:"kepek/pikachumovie.webp", info:"Gyerek/Fantasy • 2019"},
];

let currentPage = 1;
const perPage = 20;
let searchTerm = "";

// KERESŐ
document.getElementById("searchInput").addEventListener("input", function(e){
    searchTerm = e.target.value.toLowerCase();
    currentPage = 1;
    renderMovies();
});

// FILMEK MEGJELENÍTÉSE
function renderMovies(){
    const grid = document.getElementById("movie");
    grid.innerHTML = "";

    const filteredMovies = movies.filter(movie =>
        movie.title.toLowerCase().includes(searchTerm)
    );

    const start = (currentPage - 1) * perPage;
    const end = start + perPage;

    const pageMovies = filteredMovies.slice(start, end);

    pageMovies.forEach(movie => {
        grid.innerHTML += `
        <div class="movie-block" onclick="goToMovie('${movie.id}')">
            <img src="${movie.img}">
            <div class="movie-info">
                <p>${movie.info}</p>
                <button>▶ Lejátszás</button>
            </div>
            <h3>${movie.title}</h3>
        </div>
        `;
    });

    document.getElementById("pageNum").innerText = currentPage;
}

// NAVIGÁCIÓ
function goToMovie(id){
    window.location.href = "filmek.html?film=" + id;
}

// LAPOZÁS
function nextPage(){
    const filteredMovies = movies.filter(movie =>
        movie.title.toLowerCase().includes(searchTerm)
    );

    if(currentPage * perPage < filteredMovies.length){
        currentPage++;
        renderMovies();
    }
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        renderMovies();
    }
}

renderMovies();

// HEADER RANDOM KÉP
const kepek = [
    "kepek/header1.webp",
    "kepek/header2.webp",
    "kepek/header3.webp",
    "kepek/header4.webp",
    "kepek/header5.webp",
    "kepek/header6.webp"
];

let elozo = localStorage.getItem("elozoKep");
let random;

do {
    random = Math.floor(Math.random() * kepek.length);
} while (random == elozo);

localStorage.setItem("elozoKep", random);

document.getElementById("header").style.backgroundImage =
`linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('${kepek[random]}')`;
</script>
